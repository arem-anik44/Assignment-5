<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Home</title>

    <!-- favicon -->
     <link rel="shortcut icon" href="./assets/github-brands-solid.png" type="image/x-icon">

    
    <!-- daisyui and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- link css sheets -->
    <link rel="stylesheet" href="./styles/style2.css">
</head>
<body>

    <header>
        <div class="navbar bg-base-100 shadow-sm px-10 ">
            <div class="flex items-center  flex-1 gap-3">
                <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
                <h2 class="btn-ghost text-xl font-semibold">Github Issue Tracker</h2>
            </div>
            <div class="flex gap-2 pt-5 w-full md:w-auto">
                <div class="join w-full md:w-auto">
                    <div class="w-full">
                        <label class="input validator join-item w-full md:w-64">
                            <i class="fa-brands fa-sistrix"></i>
                            <input type="text" placeholder="Search" id="input-search" class="w-full" required />
                        </label>
                        <div class="validator-hint">Enter valid keyword to search</div>
                    </div>
                    <button id="btn-search" class="btn btn-neutral join-item">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <section class=" mx-auto mt-10 w-11/12 shadow-gray-lg">

    <div class="nav-btn space-x-2.5 bg-white p-6 border border-gray-200 shadow-xl ">
        <button id="all-btn" onclick="showAll()" class="btn btn-neutral btn-outline active click-btn w-25">All</button>
        <button id="open-btn" onclick="showOpen()" class="btn btn-neutral btn-outline click-btn w-25">Open</button>
        <button id="closed-btn" onclick="showClosed()" class="btn click-btn btn-neutral btn-outline w-25">Closed</button>
    </div>

    <div id="issue-container" class="p-6 mt-10 border border-gray-200 shadow-xl flex justify-between">
        <div class="flex items-center gap-3">
            <div id="imageUpdate">
                <img src="./assets/Aperture.png" class="bg-[#ECE4FF] rounded-full p-2"  alt="">

            </div>
            
            <div class="space-y-1">
                <h2 class="font-semibold"><span id="numberUpdate">50</span> Issues</h2>
                <p class="text-[#64748B] text-[14px]">Track and manage your project issues</p>
            </div>
            
        </div>
        <div class="flex gap-3">
            <div class="flex items-center gap-1.5">
                <i class="fa-solid fa-circle" style="color: rgb(0,169,110);"></i>
                <p>Open</p>
            </div>
            <div class="flex items-center gap-1.5">
                <i class="fa-solid fa-circle" style="color: rgb(168,85,247);"></i>
                <p>Closed</p>
            </div>
        </div>
    </div>

    </section>


    <div id="spinner" class="flex justify-center items-center py-10 hidden">
      <span class="loading loading-infinity loading-xl"></span>
    </div>

    <section id="cards-container" class="mt-15 w-11/12 mx-auto grid grid-cols-1 md:grid-cols-4 gap-3 ">
        
    </section>
    
    

    <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="details-container" class="space-y-5"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary rounded">Close</button>
          </form>
        </div>
      </div>
    </dialog>


    <section>
        
    </section>


    <script src="./js/code2.js"></script>
    
    
</body>
</html>
