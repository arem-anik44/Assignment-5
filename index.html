<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- favicon -->
     <link rel="shortcut icon" href="./assets/github-brands-solid.png" type="image/x-icon">

    
    <!-- daisyui and tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- link css sheets -->
     <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

    <header>
        <div class="navbar bg-base-100 shadow-sm px-10 ">
            <div class="flex items-center  flex-1 gap-3">
                <img class="w-10 h-10" src="./assets/github-logo.png" alt="">
                <h2 class="btn-ghost text-xl font-semibold">Github Issue Tracker</h2>
            </div>
            <div class="flex gap-2">
                <div class="join">
                    <div>
                        <label class="input validator join-item">
                        <i class="fa-brands fa-sistrix"></i>
                        <input type="text" placeholder="Search" required />
                        </label>
                        <div class="validator-hint hidden">Enter valid email address</div>
                    </div>
                    <button class="btn btn-neutral join-item"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                
            </div>
        </div>
    </header>
    




    <script src="./js/code.js"></script>
    
</body>
</html>
