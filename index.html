<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker | Sign In</title>

    <!-- favicon -->
     <link rel="shortcut icon" href="./assets/github-brands-solid.png" type="image/x-icon">

    
    <!-- daisyui and tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- link css sheets -->
     <link rel="stylesheet" href="./styles/style.css">
</head>
<body>

    <section class="">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border px-4 py-10 mx-auto my-40 space-y-2">
           <div class="flex flex-col text-center mb-5">
            <img src="./assets/github-logo.png" class="w-25 h-26 mx-auto mb-3">
            <h2 class="font-semibold text-2xl">Github Issue Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issue</p>
           </div>

            <label class="label text-[#3D3746] font-medium">Username</label>
            <input type="text" id="username-input" class="input" placeholder="Enter Username" />

            <label class="label text-[#3D3746] font-medium">Password</label>
            <input type="password" id="pass-input" class="input" placeholder="Enter Password" />

            <button id="signin-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
    </section>
    




    <script src="./js/code.js"></script>
    
</body>
</html>
